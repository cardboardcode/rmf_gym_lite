fleet_manager: {prefix: 'http://localhost:8080'}
reference_coordinates:
  L1:
    rmf:
    - [1, 1]
    - [1, 1]
    - [1, 1]
    - [1, 1]
    robot:
    - [1, 1]
    - [1, 1]
    - [1, 1]
    - [1, 1]
  L2:
    rmf:
    - [1, 1]
    - [1, 1]
    - [1, 1]
    - [1, 1]
    robot:
    - [1, 1]
    - [1, 1]
    - [1, 1]
    - [1, 1]
rmf_fleet:
  account_for_battery_drain: false
  actions: [clean]
  ambient_system: {power: 20.0}
  battery_system: {capacity: 24.0, charging_current: 5.0, voltage: 12.0}
  finishing_request: park # [park, charge, nothing]
  limits:
    angular: [0.6, 2.0]
    linear: [0.5, 0.75]
  max_delay: 3600
  mechanical_system: {friction_coefficient: 0.22, mass: 20.0, moment_of_inertia: 10.0}
  name: invisibot
  profile: {footprint: 0.3, vicinity: 0.5}
  publish_fleet_state: 2.0
  recharge_soc: 0.1
  recharge_threshold: 0.1
  responsive_wait: true
  reversible: true
  robot_state_update_frequency: 2.0
  robots:
    robot0: {charger: charger_2, responsive_wait: true}
    robot1: {charger: charger_1, responsive_wait: true}
    robot2: {charger: charger_3, responsive_wait: true}
  task_capabilities: {clean: true, delivery: true, loop: true}
  tool_system: {power: 0.0}
