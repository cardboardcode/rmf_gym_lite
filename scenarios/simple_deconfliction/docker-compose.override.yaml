services:
   rmf_core:
     volumes:
      - ./simple_deconfliction/:/rmf_core_ws/map/simple_deconfliction
      - ./simple_deconfliction/debug.rviz:/rmf_core_ws/install/rmf_core/rviz/debug.rviz
     command: bash -c "python3 /rmf_core_ws/src/rmf_core/rviz/update_map_name.py /rmf_core_ws/map/simple_deconfliction/simple_deconfliction.building.yaml && ros2 launch rmf_core start_rmf_core.launch.xml config_file:=/rmf_core_ws/map/simple_deconfliction/simple_deconfliction.building.yaml headless:=true"
   fleet_adapter_invisibot:
     scale: 0
   fleet_adapter_invisibot_a:
     container_name: fleet_adapter_invisibot_a_c
     image: ghcr.io/cardboardcode/fleet_adapter_invisibot:jazzy
     volumes:
      - ./simple_deconfliction/0_config.yaml:/fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/config.yaml
      - ./simple_deconfliction/nav_graph.yaml:/fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/nav_graph.yaml
     environment:
       RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
     network_mode: "host"
     command: bash -c "ros2 run fleet_adapter_invisibot fleet_adapter -c /fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/config.yaml -n /fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/nav_graph.yaml -s {WS_URL:-ws://localhost:8000}/_internal"
     depends_on:
      rmf_core:
        condition: service_healthy
     restart: unless-stopped
   fleet_adapter_invisibot_b:
     container_name: fleet_adapter_invisibot_b_c
     image: ghcr.io/cardboardcode/fleet_adapter_invisibot:jazzy
     volumes:
      - ./simple_deconfliction/1_config.yaml:/fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/config.yaml
      - ./simple_deconfliction/nav_graph.yaml:/fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/nav_graph.yaml
     environment:
       RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
     network_mode: "host"
     command: bash -c "ros2 run fleet_adapter_invisibot fleet_adapter -c /fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/config.yaml -n /fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/nav_graph.yaml -s {WS_URL:-ws://localhost:8000}/_internal"
     depends_on:
      rmf_core:
        condition: service_healthy
     restart: unless-stopped
   invisibot:
     volumes:
       - ./simple_deconfliction/robots.json:/invisibot_ws/robots.json
   lift_adapter_mock:
     scale: 0
   door_adapter_mock:
     scale: 0