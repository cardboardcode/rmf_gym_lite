services:
   rmf_core:
     volumes:
      - ./simple_traffic_light/:/rmf_core_ws/map/simple_traffic_light
      - ./simple_traffic_light/debug.rviz:/rmf_core_ws/install/rmf_core/rviz/debug.rviz
     command: > 
        bash -c "python3 /rmf_core_ws/src/rmf_core/rviz/update_map_name.py /rmf_core_ws/map/simple_traffic_light/simple_traffic_light.building.yaml &&
        ros2 launch rmf_core start_rmf_core.launch.xml
        config_file:=/rmf_core_ws/map/simple_traffic_light/simple_traffic_light.building.yaml
        viz_config_file:=/rmf_core_ws/install/rmf_core/rviz/debug.rviz
        headless:=${HEADLESS:-true}"
  #  fleet_adapter_invisibot:
  #    volumes:
  #     - ./fleet_config.base.yaml:/fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/config.yaml
  #     - ./simple_traffic_light/nav_graph.yaml:/fleet_adapter_invisibot_ws/src/fleet_adapter_invisibot/nav_graph.yaml
   fleet_adapter_invisibot:
    scale: 0
   traffic_light_adapter_invisibot:
     container_name: traffic_light_adapter_invisibot_c
     image: traffic_light_adapter_invisibot:jazzy
     environment:
       RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
       RCUTILS_COLORIZED_OUTPUT: 1
     volumes:
      - ./fleet_config.base.yaml:/config.yaml
     network_mode: "host"
     command: bash -c "ros2 launch traffic_light_adapter_invisibot fleet_adapter.launch.xml config_file:=/config.yaml server_uri:=${WS_URL:-ws://localhost:8000}/_internal use_sim_time:=false"
     depends_on:
      rmf_core:
        condition: service_healthy
     restart: unless-stopped
   invisibot:
     volumes:
       - ./robots.base.json:/invisibot_ws/robots.json
   lift_adapter_mock:
     scale: 0
   door_adapter_mock:
     scale: 0