  recharge_soc: 0.1
  recharge_threshold: 0.1
  responsive_wait: true
  reversible: true
  robot_state_update_frequency: 2.0
  robots:
    robot1: {charger: 0_c, responsive_wait: true}
  task_capabilities: {clean: true, delivery: true, loop: true}
  tool_system: {power: 0.0}
